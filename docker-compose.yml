version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: hr-copilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr-copilot-api
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379
      - CHROMA_PERSIST_DIR=./data/chroma_db
      - POLICIES_DIR=./data/policies
      - TEMPLATES_DIR=./data/templates
      - AUDIT_LOG_PATH=./data/audit_log.jsonl
      - CONFIDENCE_THRESHOLD=0.75
      - HR_COMPANY_NAME=${HR_COMPANY_NAME:-Acme Corp}
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: hr-copilot-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - api
    command: streamlit run frontend/app.py

volumes:
  redis_data:
